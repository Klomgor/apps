{% set tpl = ix_lib.base.render.Render(values) %}

{% set powerbeacon_network = tpl.networks.create_internal("powerbeacon_network") %}

{% set c1 = tpl.add_container(values.consts.powerbeacon_container_name, "image") %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}

{% set pg_config = {
  "user": values.consts.db_user,
  "password": values.powerbeacon.db_password,
  "database": values.consts.db_name,
  "volume": values.storage.postgres_data,
} %}
{% set postgres = tpl.deps.postgres(values.consts.postgres_container_name, values.powerbeacon.postgres_image_selector, pg_config, perm_container) %}
{% do postgres.container.add_network(powerbeacon_network) %}

{% do c1.add_network(powerbeacon_network) %}
{% do c1.depends.add_dependency(values.consts.postgres_container_name, "service_healthy") %}

{% do c1.add_caps(["CHOWN", "SETGID", "SETUID"]) %}
{% do c1.healthcheck.set_test("curl", {"port": values.consts.internal_web_port, "path": "/health"}) %}
{% do c1.environment.add_env("JWT_SECRET", values.powerbeacon.session_secret) %}
{% do c1.environment.add_env("DB_URL", postgres.get_url("postgresql")) %}

{% do c1.add_port(values.network.web_port, {"container_port": values.consts.internal_web_port}) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do postgres.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
