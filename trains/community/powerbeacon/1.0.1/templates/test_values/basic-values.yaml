resources:
  limits:
    cpus: 2.0
    memory: 4096

TZ: Etc/UTC

powerbeacon:
  postgres_image_selector: postgres_18_image
  db_password: changeMe
  session_secret: your-secret-key-change-in-production
  additional_envs: []

network:
  web_port:
    bind_mode: published
    port_number: 8000

ix_volumes:
  postgres_data: /opt/tests/mnt/powerbeacon/postgres-data

storage:
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: postgres_data
      create_host_path: true
  additional_storage: []
