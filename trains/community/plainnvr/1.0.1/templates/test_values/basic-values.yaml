resources:
  limits:
    cpus: 2.0
    memory: 4096

TZ: Etc/UTC

plainnvr:
  default_segment_seconds: 60
  webrtc_candidates: []
  additional_envs: []

run_as:
  user: 568
  group: 568

network:
  host_network: false
  web_port:
    bind_mode: published
    port_number: 8080
  rtsp_port:
    bind_mode: exposed
    port_number: 8081
  webrtc_port:
    bind_mode: exposed
    port_number: 8082

ix_volumes:
  data: /opt/tests/mnt/plainpvr/data
  recordings: /opt/tests/mnt/plainpvr/recordings

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  recordings:
    type: ix_volume
    ix_volume_config:
      dataset_name: recordings
      create_host_path: true
  additional_storage: []
