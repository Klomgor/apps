{% macro nginx_config(values) -%}
server {
    listen {{ values.network.web_port.port_number }}{% if values.network.certificate_id %} ssl{% endif %};
    {% if values.network.certificate_id %}
    ssl_certificate {{ values.consts.ssl_cert_path }};
    ssl_certificate_key {{ values.consts.ssl_key_path }};
    error_page 497 =301 https://$host:{{ values.network.web_port.port_number }}$request_uri;
    {% endif %}

    location /health {
        return 200;
    }

    location / {
        proxy_pass http://{{ values.consts.seafile_container_name }}:80;
        proxy_read_timeout 310s;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        {% if values.network.certificate_id %}
        proxy_set_header X-Forwarded-Proto $scheme;
        {% endif %}
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        client_max_body_size 0;
    }
    {% if values.seafile.enable_seadoc %}
    location /socket.io {
        proxy_pass http://{{ values.consts.seadoc_container_name }}:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_redirect off;
        proxy_buffers 8 32k;
        proxy_buffer_size 64k;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        {% if values.network.certificate_id %}
        proxy_set_header X-Forwarded-Proto $scheme;
        {% endif %}
        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;
    }

    location /sdoc-server/ {
        proxy_pass http://{{ values.consts.seadoc_container_name }}:80/;
        proxy_redirect off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        {% if values.network.certificate_id %}
        proxy_set_header X-Forwarded-Proto $scheme;
        {% endif %}
        proxy_set_header X-Forwarded-Host $server_name;
        client_max_body_size 100m;
    }
    {% endif %}
}
{% endmacro %}
