resources:
  limits:
    cpus: 2
    memory: 4096

TZ: Etc/UTC

metatana:
  additional_envs: []

run_as:
  user: 568
  group: 568

network:
  web_port:
    bind_mode: published
    port_number: 8080

ix_volumes:
  data: /opt/tests/mnt/metatana/data
  media: /opt/tests/mnt/metatana/media

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  media:
    type: ix_volume
    ix_volume_config:
      dataset_name: media
      create_host_path: true
  additional_storage: []
