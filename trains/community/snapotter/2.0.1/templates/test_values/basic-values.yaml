resources:
  limits:
    cpus: 2.0
    memory: 4096

snapotter:
  postgres_image_selector: postgres_18_image
  db_password: password
  redis_password: password
  additional_envs: []

network:
  web_port:
    bind_mode: published
    port_number: 8080

run_as:
  user: 568
  group: 568

ix_volumes:
  data: /opt/tests/mnt/snapotter/data
  workspace: /opt/tests/mnt/snapotter/workspace
  postgres_data: /opt/tests/mnt/snapotter/postgres_data

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  workspace:
    type: ix_volume
    ix_volume_config:
      dataset_name: workspace
      create_host_path: true
  postgres_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: postgres_data
      create_host_path: true
  additional_storage: []
