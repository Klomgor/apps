images:
  image:
    repository: ghcr.io/timothepoznanski/poznote
    tag: 6.37.0-rootless
  mcp_image:
    repository: ghcr.io/timothepoznanski/poznote-mcp
    tag: 6.37.0
  container_utils_image:
    repository: ixsystems/container-utils
    tag: 1.0.2

consts:
  poznote_container_name: poznote
  mcp_container_name: mcp
  perms_container_name: permissions
  data_path: /var/www/html/data
  internal_web_port: 8080
  internal_mcp_port: 8045
  run_as_user: 1000
  run_as_group: 1000
  notes_body: |
    Default credentials:
      - Username: `admin_change_me`
      - Password: `admin`
