resources:
  limits:
    cpus: 2
    memory: 4096

TZ: Etc/UTC

poznote:
  enable_mcp: true
  additional_envs: []

network:
  web_port:
    bind_mode: published
    port_number: 8081
  mcp_port:
    bind_mode: published
    port_number: 8082

ix_volumes:
  data: /opt/tests/mnt/poznote/data

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  additional_storage: []
