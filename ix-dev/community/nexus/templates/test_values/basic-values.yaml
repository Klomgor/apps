resources:
  limits:
    cpus: 2.0
    memory: 2048

nexus:
  additional_java_opts:
    - property: -Djava.net.preferIPv4Stack
      value: "true"
    - property: -Xms1024M
  additional_envs: []

run_as:
  user: 568
  group: 568

network:
  host_network: false
  web_port:
    bind_mode: published
    port_number: 8080
  additional_ports:
    - bind_mode: published
      port_number: 8082
      container_port: 8082

ix_volumes:
  nexus_data: /opt/tests/mnt/nexus-data

storage:
  nexus_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: nexus_data
      create_host_path: true
  additional_storage: []
