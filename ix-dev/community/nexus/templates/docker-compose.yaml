{% set tpl = ix_lib.base.render.Render(values) %}
{% set c1 = tpl.add_container(values.consts.nexus_container_name, "image") %}

{% set vm_params = namespace(x=[]) %}
{% for opt in values.nexus.additional_java_opts %}
  {% if "=" in opt.property %}{% do tpl.funcs.fail("Expected [Additional Java Opts] to not contain [=] in the key [%s]"|format(opt.property)) %}{% endif %}

  {% set param = namespace(x=opt.property) %}
  {% if opt.value %}{% set param.x = "%s=%s"|format(param.x, opt.value) %}{% endif %}
  {% do vm_params.x.append(param.x) %}
{% endfor %}

{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}
{% set perm_config = {"uid": values.run_as.user, "gid": values.run_as.group, "mode": "check"} %}

{% do c1.set_user(values.run_as.user, values.run_as.group) %}
{% do c1.healthcheck.set_test("curl", {"port": values.consts.internal_container_port, "path": "/service/rest/v1/status"}) %}
{% do c1.environment.add_env("INSTALL4J_ADD_VM_PARAMS", vm_params.x|join(" ")) %}
{% do c1.environment.add_user_envs(values.nexus.additional_envs) %}

{% do c1.add_port(values.network.web_port, {"container_port": values.consts.internal_container_port}) %}

{% for port in values.network.additional_ports %}
  {% do c1.add_port(port) %}
{% endfor %}

{% do c1.add_storage("/nexus-data", values.storage.nexus_data) %}
{% do perm_container.add_or_skip_action("nexus-data", values.storage.nexus_data, perm_config) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
  {% do perm_container.add_or_skip_action(store.mount_path, store, perm_config) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do c1.depends.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}

{{ tpl.render() | tojson }}
