resources:
  limits:
    cpus: 2
    memory: 4096

TZ: America/New_York

seafile:
  db_password: password
  db_root_password: root_password
  redis_password: password
  server_url: http://seafile.example.com:8080
  admin_email: admin@example.com
  admin_password: password
  jwt_private_key: exactly-32-characters-app-keyyyy
  enable_seadoc: true
  additional_envs: []

network:
  web_port:
    bind_mode: published
    port_number: 8080

run_as:
  user: 568
  group: 568

ix_volumes:
  data: /opt/tests/mnt/seafile/data
  mariadb_data: /opt/tests/mnt/seafile/mariadb_data
  seadoc_data: /opt/tests/mnt/seafile/seadoc_data

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  mariadb_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: mariadb_data
      create_host_path: true
  seadoc_data:
    type: ix_volume
    ix_volume_config:
      dataset_name: seadoc_data
      create_host_path: true
  additional_storage: []
