resources:
  limits:
    cpus: 2
    memory: 4096

stlquest:
  additional_envs: []

run_as:
  user: 568
  group: 568

network:
  web_port:
    bind_mode: published
    port_number: 8080
  host_network: false

ix_volumes:
  data: /opt/tests/mnt/stlquest/data
  prints: /opt/tests/mnt/stlquest/prints

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  prints:
    type: ix_volume
    ix_volume_config:
      dataset_name: prints
      create_host_path: true
